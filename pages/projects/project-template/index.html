<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toggle Select Class</title>
<style>
  .box {
    border: 1px solid black;
    border-radius: 50%;
    height: 10px;
    width: 10px;
    background-color: #ccc;
    margin: 10px;
    display: inline-block;
    cursor: pointer;
  }
  #displayedImage{
    width: 750px;
  }
  .select {
    border: 2px solid blue;
  }
  .arrow {
    cursor: pointer;
    display: inline-block;
  }
</style>
</head>
<body>
  <img id="displayedImage" src="image1.jpg" alt="Displayed Image">
<div class="arrow" id="prev">&#10094;</div>
<div class="box select" id="box1"></div>
<div class="box" id="box2"></div>
<div class="box" id="box3"></div>
<div class="box" id="box4"></div>
<div class="box" id="box5"></div>
<div class="arrow" id="next">&#10095;</div>



<script>
  const boxes = document.querySelectorAll('.box');
  const prevArrow = document.getElementById('prev');
  const nextArrow = document.getElementById('next');
  const displayedImage = document.getElementById('displayedImage');
  let currentIndex = 0;

  function toggleSelected(index) {
    boxes.forEach(b => b.classList.remove('select'));
    boxes[index].classList.add('select');
    // Update the image source based on the selected box
    displayedImage.src = `image${index + 1}.jpg`; // Assuming image filenames are image1.jpg, image2.jpg, etc.
  }

  prevArrow.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + boxes.length) % boxes.length;
    toggleSelected(currentIndex);
  });

  nextArrow.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % boxes.length;
    toggleSelected(currentIndex);
  });

  boxes.forEach((box, index) => {
    box.addEventListener('click', () => {
      currentIndex = index;
      toggleSelected(currentIndex);
    });
  });
</script>

</body>
</html>
